name: ??????

on:
  schedule:
    - cron: '0 0 * * *'      # ?? UTC 0:00 (???? 8:00)
  workflow_dispatch:           # ??????

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ????
        run: npm install

      - name: ??????
        run: node scraper/scraper.js

      - name: ??????
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price.json
          git diff --staged --quiet || git commit -m "update: price data $(date +%Y-%m-%d)"
          git push

      - name: ?? Pages ????
        run: |
          mkdir -p _site
          cp price.json _site/

      - name: ?? Pages ??
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: ??? GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
